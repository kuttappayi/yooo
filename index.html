<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poochayeeee ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6e7,#ffc2d1,#ffe5ec);
    position:relative;
}

/* Floating Hearts */
.heart{
    position:absolute;
    pointer-events:none;
    opacity:.7;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120px);
    }
}

/* Main Card */
.card{
    width:90%;
    max-width:420px;
    padding:40px 30px;
    text-align:center;
    position:relative;

    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border-radius:30px;

    box-shadow:
    0 0 20px rgba(255,105,180,.35),
    0 0 40px rgba(255,105,180,.25),
    0 0 60px rgba(255,105,180,.15);

    animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:
        0 0 20px rgba(255,105,180,.25),
        0 0 40px rgba(255,105,180,.15);
    }
    to{
        box-shadow:
        0 0 30px rgba(255,105,180,.45),
        0 0 60px rgba(255,105,180,.25);
    }
}

h1{
    color:#ff4f8b;
    font-size:2rem;
    margin-bottom:20px;
}

.question{
    font-size:24px;
    font-weight:600;
    color:#444;
    line-height:1.6;
    margin-bottom:25px;
}

/* Buttons Area */
.buttons{
    position:relative;
    height:120px;
    width:100%;
}

/* Buttons */
button{
    border:none;
    padding:14px 34px;
    border-radius:999px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

#yesBtn{
    background:#ff4f8b;
    color:white;
    box-shadow:0 0 15px rgba(255,79,139,.4);
    position:absolute;
    left:50%;
    transform:translateX(-120%);
}

#yesBtn:hover{
    scale:1.05;
}

#noBtn{
    background:white;
    color:#ff4f8b;
    border:2px solid #ff4f8b;
    position:absolute;
    left:50%;
    transform:translateX(20%);
}

.success{
    font-size:28px;
    font-weight:600;
    color:#ff4f8b;
    line-height:1.8;
}
</style>
</head>
<body>

<div class="card">
    <h1>Poochayeeee ❤️</h1>

    <div class="question">
        njn Sunday varanooo.......?
    </div>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<script>

/* Floating Hearts */
for(let i=0;i<25;i++){

    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="💖";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(16+Math.random()*20)+"px";
    heart.style.animationDuration=(5+Math.random()*8)+"s";

    document.body.appendChild(heart);
}

/* No Button Roams INSIDE the Card */
const noBtn = document.getElementById("noBtn");
const card = document.querySelector(".card");

function moveButton(){

    const cardRect = card.getBoundingClientRect();
    const btnRect = noBtn.getBoundingClientRect();

    const maxX = cardRect.width - btnRect.width - 30;
    const maxY = cardRect.height - btnRect.height - 30;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    noBtn.style.transform = "none";
}

noBtn.addEventListener("mouseenter", moveButton);

noBtn.addEventListener("touchstart", (e)=>{
    e.preventDefault();
    moveButton();
});

/* Yes Button */
document.getElementById("yesBtn").addEventListener("click", ()=>{

    document.querySelector(".card").innerHTML = `
        <div class="success">
            hehehehehehehehehehehehee 😚😌
        </div>
    `;
});

</script>

</body>
</html>
